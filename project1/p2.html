<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bird Landing Page</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>
    <div class="navbar">
        <div class="logo">
            <h1>BIRD</h1>
        </div>
        <div class="navigation">
            <ul>
                <li>Products</li>
                <li>Pricing</li>
                <li>Customers</li>
                <li>Partners</li>
                <li>Resources</li>
            </ul>
        </div>
        <div class="buttons">
            <button class="btn">Get a demo</button>
            <button class="btn1">Log in</button>
        </div>
    </div>

    <section id="main">
        <div class="content-left">
            <h1>Personalized <span>Email Marketing</span> scaled for impact</h1>
            <p>One unified platform to enhance engagement, increase conversions, and grow your revenue.</p>
            
            <div class="email-area">
                <input type="email" placeholder="What's your email?">
                <button class="btn2">See Bird</button>
                <p class="disclaimer">By clicking "See Bird" you agree to Bird's Privacy Notice.</p>
            </div>
        </div>
        
        <div class="content-right">
            <div class="box"></div>
        </div>
    </section>
</body>
</html>
